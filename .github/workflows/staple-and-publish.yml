name: Staple and publish

# Manual recovery workflow used when the main publish workflow exits with the
# notarization still "In Progress" (Apple's queue is slow).
# Inputs:
#   - workflow_run_id: the publish run that produced the signed DMG. We pull
#     the dmg + notary metadata from that run's artifacts.
#   - submission_id (optional): override the submission ID stored in the
#     artifact (e.g. if you re-submitted manually).

on:
  workflow_dispatch:
    inputs:
      workflow_run_id:
        description: 'Run ID of the publish workflow whose DMG should be stapled'
        required: true
        type: string
      submission_id:
        description: 'Override submission ID (default: read from artifact)'
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  staple:
    runs-on: macos-latest
    timeout-minutes: 350  # GitHub job max is 360
    steps:
      - uses: actions/checkout@v4

      - name: Download DMG from publish run
        uses: actions/download-artifact@v4
        with:
          name: signed-build
          path: release/
          run-id: ${{ inputs.workflow_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download notary metadata from publish run
        uses: actions/download-artifact@v4
        with:
          name: notary-meta
          path: notary-meta/
          run-id: ${{ inputs.workflow_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve DMG path and submission ID
        run: |
          DMG_PATH=$(ls release/*.dmg | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "No DMG found in artifact"
            exit 1
          fi
          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV
          echo "DMG: $DMG_PATH"

          if [ -n "${{ inputs.submission_id }}" ]; then
            SID="${{ inputs.submission_id }}"
            echo "Using submission ID from input: $SID"
          else
            SID=$(cat notary-meta/submission_id.txt | tr -d '[:space:]')
            echo "Using submission ID from artifact: $SID"
          fi
          echo "SUBMISSION_ID=$SID" >> $GITHUB_ENV

      - name: Prepare notarization auth
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_API_KEY_BASE64" ] && [ -n "$APPLE_API_KEY_ID" ] && [ -n "$APPLE_API_ISSUER_ID" ]; then
            echo "Auth method: App Store Connect API key"
            KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
            echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
            chmod 600 "$KEY_PATH"
            echo "NOTARY_AUTH=--key $KEY_PATH --key-id $APPLE_API_KEY_ID --issuer $APPLE_API_ISSUER_ID" >> $GITHUB_ENV
            echo "AUTH_METHOD=api_key" >> $GITHUB_ENV
          elif [ -n "$APPLE_ID" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "Auth method: Apple ID + app-specific password"
            echo "AUTH_METHOD=apple_id" >> $GITHUB_ENV
          else
            echo "No notarization credentials configured."
            exit 1
          fi

      - name: Poll until done
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "$AUTH_METHOD" = "api_key" ]; then
            AUTH_ARGS="$NOTARY_AUTH"
          else
            AUTH_ARGS="--apple-id $APPLE_ID --password $APPLE_APP_SPECIFIC_PASSWORD --team-id $APPLE_TEAM_ID"
          fi

          echo "=== Polling $SUBMISSION_ID ==="
          START=$(date +%s)
          while true; do
            NOW=$(date +%s)
            ELAPSED=$((NOW - START))
            INFO=$(xcrun notarytool info "$SUBMISSION_ID" $AUTH_ARGS --output-format json 2>&1)
            STATUS=$(echo "$INFO" | python3 -c "import json,sys; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "parse_error")
            echo "[${ELAPSED}s] status: $STATUS"
            if [ "$STATUS" = "Accepted" ]; then
              echo "=== Accepted after ${ELAPSED}s ==="
              break
            elif [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              echo "=== Notarization failed: $STATUS ==="
              echo "$INFO"
              xcrun notarytool log "$SUBMISSION_ID" $AUTH_ARGS || true
              exit 1
            fi
            sleep 60
          done

          echo "=== Notarization log ==="
          xcrun notarytool log "$SUBMISSION_ID" $AUTH_ARGS || true

      - name: Staple DMG
        run: |
          xcrun stapler staple -v "$DMG_PATH"
          xcrun stapler validate -v "$DMG_PATH"
          spctl -a -t open --context context:primary-signature -vv "$DMG_PATH" || true

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "=== Publishing $DMG_PATH to release $TAG ==="
          ls -la release/
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists, uploading assets"
            gh release upload "$TAG" "$DMG_PATH" release/latest-mac.yml --clobber
          else
            echo "Creating release $TAG"
            gh release create "$TAG" "$DMG_PATH" release/latest-mac.yml \
              --title "$TAG" --notes "Release $TAG"
          fi
          echo "=== Release URL ==="
          gh release view "$TAG" --json url --jq .url
