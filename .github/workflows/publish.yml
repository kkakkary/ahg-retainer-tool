name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: macos-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Environment info
        run: |
          echo "=== System info ==="
          sw_vers
          uname -a
          echo "Arch: $(arch)"
          echo "Runner: $RUNNER_OS / $RUNNER_ARCH"
          echo ""
          echo "=== Tool versions ==="
          node --version
          npm --version
          xcrun --show-sdk-path || true
          xcrun --find codesign
          xcrun --find notarytool
          xcrun notarytool --version
          codesign --version || true
          echo ""
          echo "=== Existing keychains ==="
          security list-keychains -d user
          echo ""
          echo "=== Existing code signing identities ==="
          security find-identity -v -p codesigning || echo "(none)"

      - name: Install dependencies
        run: |
          echo "=== Installing npm dependencies ==="
          npm ci
          echo ""
          echo "=== Installed electron-builder version ==="
          npx electron-builder --version
          echo ""
          echo "=== @electron/osx-sign version ==="
          node -p "require('@electron/osx-sign/package.json').version" 2>/dev/null || echo "(not installed at top level)"

      - name: Install LibreOffice
        run: |
          echo "=== Installing LibreOffice ==="
          brew install --cask libreoffice
          echo "LibreOffice installed at: $(which soffice || echo 'not in PATH')"

      - name: Setup signing keychain
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -x
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"

          echo "=== Decoding P12 ==="
          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12
          ls -la /tmp/cert.p12
          file /tmp/cert.p12

          echo "=== Creating keychain ==="
          security create-keychain -p "" $KEYCHAIN_PATH
          ls -la $KEYCHAIN_PATH

          echo "=== Setting keychain settings ==="
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security show-keychain-info $KEYCHAIN_PATH || true

          echo "=== Unlocking keychain ==="
          security unlock-keychain -p "" $KEYCHAIN_PATH

          echo "=== Importing P12 ==="
          security import /tmp/cert.p12 -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -T /usr/bin/codesign -f pkcs12

          echo "=== Before list-keychains update ==="
          security list-keychains -d user

          echo "=== Adding to keychain search list ==="
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')

          echo "=== After list-keychains update ==="
          security list-keychains -d user

          echo "=== Setting key partition list ==="
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" $KEYCHAIN_PATH

          echo "=== Verifying cert is usable ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          security find-identity -v -p codesigning
          security find-certificate -c "Developer ID Application" -p $KEYCHAIN_PATH | openssl x509 -noout -subject -dates -fingerprint

          rm -f /tmp/cert.p12
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          set +x

      - name: Build webpack bundle
        run: |
          echo "=== Running webpack ==="
          time npx webpack --config webpack.config.js
          echo ""
          echo "=== Webpack output ==="
          ls -la dist/

      - name: Sign with electron-builder
        timeout-minutes: 15
        env:
          CSC_KEYCHAIN: ${{ env.KEYCHAIN_PATH }}
          DEBUG: electron-builder,electron-osx-sign,@electron/osx-sign*
        run: |
          echo "=== CSC_KEYCHAIN: $CSC_KEYCHAIN ==="
          echo "=== Verifying keychain is still unlocked ==="
          security show-keychain-info $CSC_KEYCHAIN || true
          security find-identity -v -p codesigning $CSC_KEYCHAIN

          echo "=== Running electron-builder (notarization disabled here; CI handles it) ==="
          time npx electron-builder --mac --publish never 2>&1 | tee /tmp/builder.log

          echo ""
          echo "=== Build output ==="
          ls -la release/
          ls -la release/mac-universal/ 2>/dev/null || true

          echo ""
          echo "=== Verifying signed app ==="
          APP=$(find release -name "*.app" -maxdepth 3 | head -1)
          if [ -n "$APP" ]; then
            echo "App path: $APP"
            codesign --verify --deep --strict --verbose=2 "$APP"
            codesign --display --verbose=4 "$APP" 2>&1 | head -40
            echo ""
            echo "=== Entitlements ==="
            codesign --display --entitlements :- "$APP" 2>&1 | head -30
          else
            echo "No .app found!"
            exit 1
          fi

          echo ""
          echo "=== DMG info ==="
          DMG=$(ls release/*.dmg | head -1)
          echo "DMG: $DMG"
          ls -la "$DMG"
          du -h "$DMG"
          shasum -a 256 "$DMG"
          echo "DMG_PATH=$DMG" >> $GITHUB_ENV

      # ── Always upload the signed DMG and yml as artifacts. If notarization
      #    stalls on Apple's side and we abandon the run, the staple-and-publish
      #    workflow can grab them by run_id without rebuilding.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-build
          path: |
            release/*.dmg
            release/latest-mac.yml
          retention-days: 14
          if-no-files-found: error

      # ── Auth setup: prefer App Store Connect API key (.p8), fall back to
      #    Apple ID + app-specific password. Notarytool with API key is faster
      #    and more reliable in our experience and Apple's recommendation.
      - name: Prepare notarization auth
        id: auth
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_API_KEY_BASE64" ] && [ -n "$APPLE_API_KEY_ID" ] && [ -n "$APPLE_API_ISSUER_ID" ]; then
            echo "Auth method: App Store Connect API key"
            KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
            echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
            chmod 600 "$KEY_PATH"
            echo "NOTARY_AUTH=--key $KEY_PATH --key-id $APPLE_API_KEY_ID --issuer $APPLE_API_ISSUER_ID" >> $GITHUB_ENV
            echo "AUTH_METHOD=api_key" >> $GITHUB_ENV
          elif [ -n "$APPLE_ID" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "Auth method: Apple ID + app-specific password (fallback)"
            echo "AUTH_METHOD=apple_id" >> $GITHUB_ENV
            # NOTARY_AUTH built per-step below since password must come from secrets at use time
          else
            echo "No notarization credentials configured. Set either:"
            echo "  - APPLE_API_KEY_BASE64 + APPLE_API_KEY_ID + APPLE_API_ISSUER_ID  (preferred)"
            echo "  - APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID         (fallback)"
            exit 1
          fi

      - name: Submit for notarization
        id: submit
        timeout-minutes: 30
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "=== DMG to notarize: $DMG_PATH ==="
          ls -la "$DMG_PATH"
          echo "Size: $(du -h "$DMG_PATH" | cut -f1)"
          echo "SHA256: $(shasum -a 256 "$DMG_PATH")"

          echo ""
          echo "=== Checking DMG integrity ==="
          hdiutil verify "$DMG_PATH"

          # Build auth args (api_key path uses NOTARY_AUTH; apple_id path uses these env vars)
          if [ "$AUTH_METHOD" = "api_key" ]; then
            AUTH_ARGS="$NOTARY_AUTH"
          else
            AUTH_ARGS="--apple-id $APPLE_ID --password $APPLE_APP_SPECIFIC_PASSWORD --team-id $APPLE_TEAM_ID"
          fi

          echo ""
          echo "=== Submitting at $(date -u +%FT%TZ) (auth: $AUTH_METHOD) ==="
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            $AUTH_ARGS \
            --output-format json 2>&1)
          echo "=== Submit returned at $(date -u +%FT%TZ) ==="
          echo "Raw output:"
          echo "$SUBMIT_OUTPUT"

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          echo ""
          echo "Submission ID: $SUBMISSION_ID"
          echo "SUBMISSION_ID=$SUBMISSION_ID" >> $GITHUB_ENV

          # Persist for the staple-and-publish recovery workflow
          echo "$SUBMISSION_ID" > submission_id.txt
          mkdir -p notary-meta
          echo "$SUBMISSION_ID" > notary-meta/submission_id.txt
          basename "$DMG_PATH" > notary-meta/dmg_filename.txt
          date -u +%FT%TZ > notary-meta/submitted_at.txt

      - name: Upload submission metadata
        if: always() && env.SUBMISSION_ID != ''
        uses: actions/upload-artifact@v4
        with:
          name: notary-meta
          path: notary-meta/
          retention-days: 30

      # ── Poll up to 120 min for Apple. If they're slow today, the job exits
      #    successfully with a clear "use staple-and-publish workflow" message
      #    rather than failing the run. Apple's queue routinely takes hours.
      - name: Poll notarization status
        id: poll
        timeout-minutes: 120
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "$AUTH_METHOD" = "api_key" ]; then
            AUTH_ARGS="$NOTARY_AUTH"
          else
            AUTH_ARGS="--apple-id $APPLE_ID --password $APPLE_APP_SPECIFIC_PASSWORD --team-id $APPLE_TEAM_ID"
          fi

          echo "=== Polling submission $SUBMISSION_ID ==="
          START=$(date +%s)
          while true; do
            NOW=$(date +%s)
            ELAPSED=$((NOW - START))
            INFO=$(xcrun notarytool info "$SUBMISSION_ID" \
              $AUTH_ARGS \
              --output-format json 2>&1)
            STATUS=$(echo "$INFO" | python3 -c "import json,sys; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "parse_error")
            echo "[${ELAPSED}s] status: $STATUS"
            if [ "$STATUS" = "Accepted" ]; then
              echo "=== Accepted after ${ELAPSED}s ==="
              echo "POLL_RESULT=accepted" >> $GITHUB_ENV
              break
            elif [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              echo "=== Notarization failed: $STATUS ==="
              echo "$INFO"
              echo ""
              echo "=== Fetching log ==="
              xcrun notarytool log "$SUBMISSION_ID" $AUTH_ARGS
              echo "POLL_RESULT=failed" >> $GITHUB_ENV
              exit 1
            elif [ "$STATUS" = "parse_error" ]; then
              echo "Failed to parse info output:"
              echo "$INFO"
            fi
            sleep 30
          done

          echo ""
          echo "=== Notarization log (success) ==="
          xcrun notarytool log "$SUBMISSION_ID" $AUTH_ARGS || true

      - name: Handle stalled notarization
        if: steps.poll.outcome == 'failure' && env.POLL_RESULT != 'failed'
        run: |
          echo "::warning::Notarization is still 'In Progress' after 120 minutes."
          echo ""
          echo "This is almost always Apple's queue, not a problem with our build."
          echo "The DMG and submission metadata have been uploaded as artifacts."
          echo ""
          echo "To finish the release once Apple completes the submission:"
          echo "  1. Go to Actions → 'Staple and publish' → Run workflow"
          echo "  2. Set workflow_run_id = ${{ github.run_id }}"
          echo "  3. (Optional) Set submission_id = $SUBMISSION_ID"
          echo ""
          echo "Or check status manually:"
          echo "  xcrun notarytool info $SUBMISSION_ID --key ... --key-id ... --issuer ..."
          # Exit success so the workflow run is not marked failed when Apple is slow.
          # (Real notarization rejections still fail the poll step with exit 1.)
          exit 0

      - name: Staple DMG
        if: env.POLL_RESULT == 'accepted'
        run: |
          echo "=== Stapling $DMG_PATH ==="
          xcrun stapler staple -v "$DMG_PATH"
          echo ""
          echo "=== Validating staple ==="
          xcrun stapler validate -v "$DMG_PATH"
          echo ""
          echo "=== Gatekeeper assessment ==="
          spctl -a -t open --context context:primary-signature -vv "$DMG_PATH" || true

      - name: Publish to GitHub Releases
        if: env.POLL_RESULT == 'accepted'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "=== Publishing $DMG_PATH to release $TAG ==="
          ls -la release/
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists, uploading assets"
            gh release upload "$TAG" "$DMG_PATH" release/latest-mac.yml --clobber
          else
            echo "Creating release $TAG"
            gh release create "$TAG" "$DMG_PATH" release/latest-mac.yml \
              --title "$TAG" --notes "Release $TAG"
          fi
          echo ""
          echo "=== Release URL ==="
          gh release view "$TAG" --json url --jq .url
